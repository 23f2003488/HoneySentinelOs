# HoneySentinel-OS Security Policy
# Version 2.0 — with CWE mappings

version: "2.0"

context:
  project_name: "Generic Software Project"
  project_type: "application"
  language_stack: ["python", "javascript", "typescript", "java", "go", "csharp"]
  framework: "auto-detect"
  authentication_type: "standard (JWT/OAuth/Session)"
  data_sensitivity: "medium to high"
  deployment_target: "cloud or on-premise"
  has_database: true
  database_type: "sql/nosql"
  exposes_public_api: true
  handles_pii: true

agents:
  # Set to 0.95 — guarantees HITL triggers for demo
  # Every finding below 90% confidence will pause and ask the human
  confidence_threshold: 0.90
  max_iterations: 50
  max_findings: 50
  require_fp_reasoning: true

rules:

  - id: HARDCODED_SECRET
    enabled: true
    severity: critical
    category: secrets
    cwe_id: "CWE-798"
    cwe_name: "Use of Hard-coded Credentials"
    owasp: "A07:2021"
    title: "Hardcoded secret or credential"
    description: >
      API keys, passwords, tokens, or private keys hardcoded directly in source
      files rather than loaded from environment variables or a secrets manager.
    pattern_hints:
      - "hardcoded password"
      - "api key in source"
      - "secret = "
      - "private key literal"
      - "token hardcoded"
    languages: [python, javascript, typescript, java, go]
    false_positive_signals:
      - "test fixture"
      - "mock data"
      - "example key"
      - "placeholder"
      - "YOUR_KEY_HERE"

  - id: SQL_INJECTION
    enabled: true
    severity: high
    category: injection
    cwe_id: "CWE-89"
    cwe_name: "Improper Neutralization of Special Elements used in an SQL Command"
    owasp: "A03:2021"
    title: "SQL injection vulnerability"
    description: >
      SQL queries constructed via string concatenation or f-strings with
      user-controlled input, bypassing parameterized queries.
    pattern_hints:
      - "string concatenation in sql"
      - "f-string in query"
      - "user input in query"
    languages: [python, javascript, java, php]
    false_positive_signals:
      - "parameterized query"
      - "prepared statement"
      - "orm query"

  - id: INSECURE_DESERIALIZATION
    enabled: true
    severity: critical
    category: injection
    cwe_id: "CWE-502"
    cwe_name: "Deserialization of Untrusted Data"
    owasp: "A08:2021"
    title: "Insecure deserialization"
    description: >
      Use of unsafe deserialization functions like pickle.loads,
      yaml.load without SafeLoader, or eval() on external input.
    pattern_hints:
      - "pickle.loads"
      - "yaml.load without SafeLoader"
      - "eval with user input"
    languages: [python]
    false_positive_signals:
      - "safe_load"
      - "internal data only"
      - "trusted source"

  - id: BROKEN_AUTH
    enabled: true
    severity: high
    category: authentication
    cwe_id: "CWE-287"
    cwe_name: "Improper Authentication"
    owasp: "A07:2021"
    title: "Broken authentication"
    description: >
      Weak JWT handling (no signature verification, algorithm=none),
      missing authentication on sensitive routes, or insecure session tokens.
    pattern_hints:
      - "jwt decode without verify"
      - "algorithm none"
      - "verify_signature false"
      - "unprotected route"
    languages: [python, javascript, typescript]
    false_positive_signals:
      - "health check"
      - "public route intentional"
      - "internal only"

  - id: SENSITIVE_DATA_EXPOSURE
    enabled: true
    severity: high
    category: data_protection
    cwe_id: "CWE-359"
    cwe_name: "Exposure of Private Personal Information to an Unauthorized Actor"
    owasp: "A02:2021"
    title: "Sensitive data exposure"
    description: >
      PII or sensitive data logged, returned in API responses without masking,
      or stored without encryption.
    pattern_hints:
      - "password in log"
      - "pii in response"
      - "ssn in plaintext"
      - "credit card logged"
    languages: [python, javascript, typescript, java]
    false_positive_signals:
      - "masked"
      - "redacted"
      - "hashed"

  - id: INSECURE_DIRECT_OBJECT_REF
    enabled: true
    severity: high
    category: access_control
    cwe_id: "CWE-639"
    cwe_name: "Authorization Bypass Through User-Controlled Key"
    owasp: "A01:2021"
    title: "Insecure direct object reference (IDOR)"
    description: >
      Endpoints that use user-supplied IDs to access objects without verifying
      the requesting user has permission to access that object.
    pattern_hints:
      - "user_id from request without check"
      - "object fetched by id no ownership check"
    languages: [python, javascript, typescript]
    false_positive_signals:
      - "admin only"
      - "ownership verified"
      - "permission check"

  - id: MISSING_RATE_LIMIT
    enabled: true
    severity: medium
    category: availability
    cwe_id: "CWE-307"
    cwe_name: "Improper Restriction of Excessive Authentication Attempts"
    owasp: "A04:2021"
    title: "Missing rate limiting on sensitive endpoint"
    description: >
      Authentication, registration, or password reset endpoints with no
      rate limiting or throttling mechanism.
    pattern_hints:
      - "login endpoint no rate limit"
      - "register no throttle"
    languages: [python, javascript, typescript]
    false_positive_signals:
      - "rate_limit"
      - "throttle"
      - "slowapi"
      - "express-rate-limit"

  - id: VULNERABLE_DEPENDENCY
    enabled: true
    severity: high
    category: dependencies
    cwe_id: "CWE-1395"
    cwe_name: "Use of Component with Known Vulnerabilities"
    owasp: "A06:2021"
    title: "Known vulnerable dependency"
    description: >
      Dependencies with known CVEs based on version ranges in requirements.txt,
      package.json, or similar manifest files.
    pattern_hints:
      - "outdated package"
      - "cve in dependency"
    languages: [python, javascript, typescript, java]
    false_positive_signals:
      - "dev dependency only"
      - "patched internally"

  - id: MISCONFIGURED_CORS
    enabled: true
    severity: medium
    category: configuration
    cwe_id: "CWE-942"
    cwe_name: "Permissive Cross-domain Policy with Untrusted Domains"
    owasp: "A05:2021"
    title: "Misconfigured CORS policy"
    description: >
      CORS configured to allow all origins (*) on an API that handles
      authenticated requests or sensitive data.
    pattern_hints:
      - "allow_origins *"
      - "cors wildcard"
      - "Access-Control-Allow-Origin *"
    languages: [python, javascript, typescript]
    false_positive_signals:
      - "public api"
      - "no credentials"

  - id: INSECURE_CONFIG
    enabled: true
    severity: medium
    category: configuration
    cwe_id: "CWE-16"
    cwe_name: "Configuration"
    owasp: "A05:2021"
    title: "Insecure configuration"
    description: >
      Debug mode enabled in production, insecure default settings,
      or credentials embedded in config files.
    pattern_hints:
      - "debug true in production"
      - "secret in config file"
    languages: [yaml, json, toml, ini]
    false_positive_signals:
      - "development config only"
      - "example config"

  - id: COMMAND_INJECTION
    enabled: true
    severity: critical
    category: injection
    cwe_id: "CWE-78"
    cwe_name: "Improper Neutralization of Special Elements used in an OS Command"
    owasp: "A03:2021"
    title: "Command injection vulnerability"
    description: >
      User input passed to shell commands via subprocess, os.system,
      or eval without sanitization.
    pattern_hints:
      - "subprocess shell=True with user input"
      - "os.system user input"
      - "eval user input"
    languages: [python, javascript, java]
    false_positive_signals:
      - "sanitized input"
      - "whitelist only"
      - "internal command"

  - id: PATH_TRAVERSAL
    enabled: true
    severity: high
    category: injection
    cwe_id: "CWE-22"
    cwe_name: "Improper Limitation of a Pathname to a Restricted Directory"
    owasp: "A01:2021"
    title: "Path traversal vulnerability"
    description: >
      File paths constructed from user input without validation,
      allowing access to files outside the intended directory.
    pattern_hints:
      - "os.path.join with user input"
      - "open() with user-controlled path"
      - "path traversal ../"
    languages: [python, javascript, java]
    false_positive_signals:
      - "path sanitized"
      - "basename only"
      - "whitelist paths"

severity_actions:
  critical:
    report_section: "critical_findings"
    recommended_action: "Block merge / deployment immediately"
    escalate: true
  high:
    report_section: "high_findings"
    recommended_action: "Fix before next release"
    escalate: false
  medium:
    report_section: "medium_findings"
    recommended_action: "Schedule fix within sprint"
    escalate: false
  low:
    report_section: "low_findings"
    recommended_action: "Add to backlog"
    escalate: false
  info:
    report_section: "informational"
    recommended_action: "Review and document"
    escalate: false

scope:
  include_extensions:
    - .py
    - .js
    - .ts
    - .jsx
    - .tsx
    - .yaml
    - .yml
    - .json
    - .toml
    - .env
    - .ini
    - .cfg
    - .txt
  exclude_paths:
    - node_modules/
    - .git/
    - __pycache__/
    - .venv/
    - venv/
    - dist/
    - build/
    - "*.min.js"
    - "*.lock"
  max_file_size_kb: 500
